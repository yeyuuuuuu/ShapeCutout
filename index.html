<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shape Cutout Studio v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Canvas always on top ── */
    .canvas-area {
      height: 45vh;
      min-height: 180px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: relative;
      padding: 10px;
    }

    /* ── Controls panel ── */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      height: 52px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      flex: 1; border: none; background: transparent;
      color: var(--muted); font-size: 10px; font-weight: 600;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: color 0.15s; padding: 6px 2px;
      border-bottom: 2px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-icon { font-size: 16px; line-height: 1; }

    /* ── Tab content ── */
    .tab-content {
      flex: 1; overflow-y: auto; position: relative;
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-content::-webkit-scrollbar { display: none; }
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      user-select: none;
    }
    .upload-zone:hover { border-color: #444; color: #999; background: var(--surface2); }
    .upload-zone.drag-over { border-color: #555; background: var(--surface2); }
    .upload-zone.has-image { border-color: #3a6; border-style: solid; color: #3a6; }
    .upload-zone .upload-icon { font-size: 22px; margin-bottom: 6px; }

    .color-row { display: flex; align-items: center; gap: 10px; }
    .color-swatch {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      cursor: pointer; overflow: hidden; flex-shrink: 0;
    }
    .color-swatch input[type="color"] {
      width: 200%; height: 200%; margin: -50%;
      cursor: pointer; border: none; padding: 0; background: none;
    }
    .color-hex {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      width: 100%;
    }
    .color-hex:focus { outline: none; border-color: #444; }

    .color-presets { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-preset {
      width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-preset:hover { transform: scale(1.15); }
    .color-preset.active { border-color: #fff; }

    .seg-group {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px; gap: 2px;
    }
    .seg-btn {
      flex: 1; padding: 6px 8px;
      border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      text-align: center; white-space: nowrap;
    }
    .seg-btn:hover { color: var(--text); }
    .seg-btn.active { background: var(--accent); color: #000; font-weight: 600; }

    .range-row { display: flex; align-items: center; gap: 10px; }
    .range-row input[type="range"] { flex: 1; accent-color: var(--text); height: 4px; }
    .range-val {
      font-size: 12px; color: var(--muted);
      min-width: 38px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .shape-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .shape-btn {
      aspect-ratio: 1; border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; line-height: 1;
    }
    .shape-btn:hover { border-color: #444; background: #252525; }
    .shape-btn.active { border-color: var(--accent); background: var(--accent); color: #000; }

    .btn {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2); color: #aaa;
      font-size: 13px; cursor: pointer;
      transition: all 0.15s; flex: 1;
    }
    .btn:hover { background: #252525; color: var(--text); border-color: #444; }
    .btn.primary { background: var(--text); color: #000; border-color: var(--text); font-weight: 600; }
    .btn.primary:hover { background: #ccc; }
    .btn.danger { border-color: #c44; color: #c44; }
    .btn.danger:hover { background: #c44; color: #fff; }
    .btn-row { display: flex; gap: 6px; }

    .info-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }

    .download-btn {
      width: 100%; padding: 11px; border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; margin-top: auto;
    }
    .download-btn:hover { opacity: 0.88; }
    .download-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #mainCanvas {
      display: none;
      max-width: 100%; max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      cursor: default;
    }
    #mainCanvas.custom-mode { cursor: crosshair; }

    .empty-state { text-align: center; color: #2a2a2a; pointer-events: none; }
    .empty-icon { font-size: 64px; margin-bottom: 12px; line-height: 1; }
    .empty-state p { font-size: 14px; color: var(--muted); }
    .shape-count { font-size: 11px; color: var(--muted); text-align: right; }

    hr { border: none; border-top: 1px solid var(--border); }

    /* ── Panel size slider ── */
    .panel-preview {
      display: flex;
      height: 28px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 10px;
      font-size: 10px;
    }
    .panel-preview-photo { background: #333; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: flex 0.2s; }
    .panel-preview-color { display: flex; align-items: center; justify-content: center; color: rgba(0,0,0,0.5); font-weight: 600; transition: flex 0.2s; }

    /* ── Palette editing ── */
    .preset-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
    .preset-del {
      position: absolute; top: -4px; right: -4px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #c44; color: #fff; border: none; cursor: pointer;
      font-size: 10px; line-height: 14px; text-align: center; padding: 0;
      display: none; z-index: 1;
    }
    #colorPresets.edit-mode .preset-del { display: block; }
    .preset-add {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px dashed var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-size: 15px;
      align-items: center; justify-content: center; line-height: 1;
      transition: all 0.15s; display: none;
    }
    #colorPresets.edit-mode .preset-add { display: flex; }
    .preset-add:hover { border-color: #888; color: var(--text); }
    #btnEditPalette { padding: 3px 8px; font-size: 10px; flex: none; }
    #btnEditPalette.active { background: var(--text); color: #000; border-color: var(--text); font-weight: 600; }

  </style>
</head>
<body>

  <!-- ── Canvas: always on top ── -->
  <div class="canvas-area">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">◎</div>
      <p>Tap Image tab to upload</p>
    </div>
    <canvas id="mainCanvas"></canvas>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">

    <nav class="tab-bar">
      <button class="tab-btn active" onclick="showTab('image',this)">
        <span class="tab-icon">↑</span>Image
      </button>
      <button class="tab-btn" onclick="showTab('color',this)">
        <span class="tab-icon">◉</span>Color
      </button>
      <button class="tab-btn" onclick="showTab('layout',this)">
        <span class="tab-icon">⊞</span>Layout
      </button>
      <button class="tab-btn" onclick="showTab('shapes',this)">
        <span class="tab-icon">★</span>Shape
      </button>
      <button class="tab-btn" onclick="showTab('save',this)">
        <span class="tab-icon">↓</span>Save
      </button>
    </nav>

    <div class="tab-content">

      <!-- Image Tab -->
      <div id="tab-image" class="tab-panel active">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon" id="uploadIcon">↑</div>
          <div id="uploadText">Tap or drag image here</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
      </div>

      <!-- Color Tab -->
      <div id="tab-color" class="tab-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span class="section-label" style="margin-bottom:0">Solid Color</span>
          <button class="btn" id="btnEditPalette" onclick="togglePaletteEdit()">Edit</button>
        </div>
        <div class="color-row" style="margin-bottom:12px">
          <div class="color-swatch" id="colorSwatch">
            <input type="color" id="colorPicker" value="#FFD700">
          </div>
          <input type="text" class="color-hex" id="colorHex" value="#FFD700" maxlength="7" spellcheck="false">
        </div>
        <div class="color-presets" id="colorPresets"></div>
      </div>

      <!-- Layout Tab -->
      <div id="tab-layout" class="tab-panel">
        <div style="margin-bottom:16px">
          <div class="section-label" style="margin-bottom:8px">Panel Position</div>
          <div class="seg-group">
            <button class="seg-btn" id="btnPanLeft"  onclick="setPanelSide('left')">◀ Left</button>
            <button class="seg-btn" id="btnPanRight" onclick="setPanelSide('right')">Right ▶</button>
            <button class="seg-btn" id="btnPanTop"   onclick="setPanelSide('top')">▲ Top</button>
            <button class="seg-btn active" id="btnPanBottom" onclick="setPanelSide('bottom')">Bottom ▼</button>
          </div>
        </div>
        <div>
          <div class="section-label" style="margin-bottom:8px">Panel Crop</div>
          <div class="panel-preview" id="panelPreview">
            <div class="panel-preview-photo" id="ppPhoto" style="flex:1">photo</div>
            <div class="panel-preview-color" id="ppColor" style="flex:1">panel</div>
          </div>
          <div class="range-row">
            <input type="range" id="panelCropSlider" min="0" max="100" value="100" oninput="onPanelCrop()">
            <span class="range-val" id="panelCropVal">100%</span>
          </div>
        </div>
      </div>

      <!-- Shapes Tab -->
      <div id="tab-shapes" class="tab-panel">
        <div class="section-label" style="margin-bottom:8px">Mode</div>
        <div class="seg-group" style="margin-bottom:16px">
          <button class="seg-btn active" id="btnAuto"   onclick="setMode('auto')">✦ Auto</button>
          <button class="seg-btn"        id="btnCustom" onclick="setMode('custom')">✎ Custom</button>
        </div>

        <div id="autoControls">
          <div style="margin-bottom:12px">
            <div class="section-label" style="margin-bottom:8px">Shape</div>
            <div class="shape-grid" id="shapeGridAuto"></div>
            <div class="letter-wrap" style="display:none;margin-top:8px">
              <input type="text" class="color-hex" maxlength="4" placeholder="A"
                style="text-align:center;font-size:15px;font-weight:bold"
                oninput="state.shapeLetter = this.value || 'A'">
              <div class="seg-group" style="margin-top:6px" id="fontBtnsAuto"></div>
            </div>
          </div>
          <div style="margin-bottom:12px">
            <div class="section-label" style="margin-bottom:8px">Count</div>
            <div class="range-row">
              <input type="range" id="shapeCount" min="3" max="60" value="18" oninput="updateLabel('shapeCount','shapeCountVal','')">
              <span class="range-val" id="shapeCountVal">18</span>
            </div>
          </div>
          <div style="margin-bottom:12px">
            <div class="section-label" style="margin-bottom:8px">Size</div>
            <div class="range-row">
              <input type="range" id="shapeSize" min="1" max="15" value="5" step="0.5" oninput="updateLabel('shapeSize','shapeSizeVal','%')">
              <span class="range-val" id="shapeSizeVal">5%</span>
            </div>
          </div>
          <div style="margin-bottom:16px">
            <div class="section-label" style="margin-bottom:8px">Variance</div>
            <div class="range-row">
              <input type="range" id="sizeVariance" min="0" max="100" value="50" oninput="updateLabel('sizeVariance','varianceVal','%')">
              <span class="range-val" id="varianceVal">50%</span>
            </div>
          </div>
          <button class="btn primary" style="width:100%" onclick="autoGenerate()">Generate</button>
        </div>

        <div id="customControls" style="display:none">
          <div style="margin-bottom:12px">
            <div class="section-label" style="margin-bottom:8px">Shape</div>
            <div class="shape-grid" id="shapeGridCustom"></div>
            <div class="letter-wrap" style="display:none;margin-top:8px">
              <input type="text" class="color-hex" maxlength="4" placeholder="A"
                style="text-align:center;font-size:15px;font-weight:bold"
                oninput="state.shapeLetter = this.value || 'A'">
              <div class="seg-group" style="margin-top:6px" id="fontBtnsCustom"></div>
            </div>
          </div>
          <div style="margin-bottom:12px">
            <div class="section-label" style="margin-bottom:8px">Size</div>
            <div class="range-row">
              <input type="range" id="customSize" min="1" max="20" value="5" step="0.5" oninput="updateLabel('customSize','customSizeVal','%')">
              <span class="range-val" id="customSizeVal">5%</span>
            </div>
          </div>
          <div style="margin-bottom:16px">
            <div class="section-label" style="margin-bottom:8px">Rotation</div>
            <div class="range-row">
              <input type="range" id="customRotation" min="0" max="360" value="0" oninput="state.customRotation=+this.value;document.getElementById('customRotationVal').textContent=this.value+'°'">
              <span class="range-val" id="customRotationVal">0°</span>
            </div>
          </div>
          <div class="info-box" style="margin-bottom:12px;font-size:11px">
            Tap canvas to place shapes
          </div>
          <div class="shape-count" id="shapeCountBadge">0 shapes</div>
          <div class="btn-row" style="margin-top:10px">
            <button class="btn" onclick="undoShape()">↩ Undo</button>
            <button class="btn danger" onclick="clearShapes()">Clear</button>
          </div>
        </div>
      </div>

      <!-- Save Tab -->
      <div id="tab-save" class="tab-panel">
        <button class="download-btn" id="downloadBtn" onclick="downloadImage()" disabled>
          ↓ Download Image
        </button>
      </div>

    </div>
  </div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const state = {
  image: null,
  color: '#FFD700',
  panelSide: 'bottom',   // 'left' | 'right' | 'top' | 'bottom'
  panelCrop: 1.0,        // fraction of photo-sized panel to show (0=hidden, 1=full 1:1)
  mode: 'auto',
  shapes: [],            // {x, y, size, type, rotation} — coords in [0,1] relative to PHOTO rect
  selectedShape: 'circle',
  palette: null, // initialized in init() after COLOR_PRESETS is defined
  paletteEditMode: false,
  shapeLetter: 'A',
  shapeFontId: 'song',
  shapeFont: 'STSong, "Songti SC", SimSun, serif',
  shapeFontWeight: '900',
  customRotation: 0,
};

const FONT_OPTS = [
  { id: 'song', label: '宋', css: 'STSong, "Songti SC", SimSun, serif',                           w: '900'    },
  { id: 'hei',  label: '黑', css: '"PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif', w: '900' },
  { id: 'kai',  label: '楷', css: '"Ma Shan Zheng", cursive',                                     w: 'normal' },
  { id: 'cu',   label: '粗', css: '"STHeiti", "Heiti SC", "Arial Black", sans-serif',              w: '900'    },
];

const SHAPE_DEFS = [
  { id: 'circle',   icon: '●' },
  { id: 'star',     icon: '★' },
  { id: 'square',   icon: '■' },
  { id: 'triangle', icon: '▲' },
  { id: 'heart',    icon: '♥' },
  { id: 'diamond',  icon: '◆' },
  { id: 'hexagon',  icon: '⬡' },
  { id: 'cross',    icon: '+' },
  { id: 'moon',     icon: '☽' },
  { id: 'flower',   icon: '✿' },
  { id: 'text',     icon: 'Aa' },
];

const COLOR_PRESETS = [
  '#FFD700','#FF4444','#FF6B35','#00BFA5',
  '#6366F1','#EC4899','#FFFFFF','#000000',
  '#3B82F6','#84CC16',
];

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(function init() {
  state.palette = [...COLOR_PRESETS];
  buildShapeGrids();
  buildFontBtns();
  buildColorPresets();
  setupUpload();
  setupColorPicker();
  setupCanvasClick();
  setPanelSide('bottom');
  setMode('auto');
  updateColorUI(state.color);

  // Pre-load web fonts so canvas ctx.font can use them immediately
  const fontsToLoad = [
    'normal 64px "Ma Shan Zheng"',
    'normal 64px "ZCOOL XiaoWei"',
  ];
  Promise.all(fontsToLoad.map(f => document.fonts.load(f)))
    .then(() => render())
    .catch(() => {});
})();

function buildShapeGrids() {
  ['shapeGridAuto', 'shapeGridCustom'].forEach(gridId => {
    const grid = document.getElementById(gridId);
    SHAPE_DEFS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'shape-btn' + (s.id === state.selectedShape ? ' active' : '');
      btn.textContent = s.icon;
      btn.title = s.id;
      btn.dataset.shapeId = s.id;
      btn.onclick = () => selectShape(s.id);
      grid.appendChild(btn);
    });
  });
}

function buildColorPresets() {
  const container = document.getElementById('colorPresets');
  container.innerHTML = '';
  state.palette.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'preset-wrap';

    const btn = document.createElement('button');
    btn.className = 'color-preset' + (c === state.color ? ' active' : '');
    btn.style.background = c;
    if (c === '#FFFFFF') btn.style.border = '1.5px solid #555';
    btn.title = c;
    btn.dataset.color = c;
    btn.onclick = () => state.paletteEditMode ? editPaletteColor(i) : setColor(c);

    const del = document.createElement('button');
    del.className = 'preset-del';
    del.textContent = '×';
    del.title = 'Remove';
    del.onclick = e => { e.stopPropagation(); removePresetColor(i); };

    wrap.appendChild(btn);
    wrap.appendChild(del);
    container.appendChild(wrap);
  });

}

function togglePaletteEdit() {
  state.paletteEditMode = !state.paletteEditMode;
  document.getElementById('colorPresets').classList.toggle('edit-mode', state.paletteEditMode);
  const btn = document.getElementById('btnEditPalette');
  btn.classList.toggle('active', state.paletteEditMode);
  btn.textContent = state.paletteEditMode ? 'Done' : 'Edit';
}

function syncAddBtn() {
  const addBtn = document.querySelector('#colorPresets .preset-add');
  if (!addBtn) return;
  const has = state.palette.includes(state.color);
  addBtn.disabled = has;
  addBtn.style.opacity = has ? '0.3' : '';
  addBtn.style.cursor = has ? 'not-allowed' : '';
  addBtn.title = has ? 'Already in palette' : 'Add current color to palette';
}

function addCurrentColorToPreset() {
  if (state.palette.includes(state.color)) return;
  state.palette.push(state.color);
  buildColorPresets();
  document.getElementById('colorPresets').classList.toggle('edit-mode', state.paletteEditMode);
  syncAddBtn();
}

function removePresetColor(index) {
  state.palette.splice(index, 1);
  buildColorPresets();
  document.getElementById('colorPresets').classList.toggle('edit-mode', state.paletteEditMode);
}

function editPaletteColor(index) {
  const input = document.createElement('input');
  input.type = 'color';
  input.value = state.palette[index];
  input.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(input);
  input.addEventListener('change', e => {
    state.palette[index] = e.target.value.toUpperCase();
    buildColorPresets();
    document.getElementById('colorPresets').classList.toggle('edit-mode', state.paletteEditMode);
    document.body.removeChild(input);
  });
  input.addEventListener('cancel', () => document.body.removeChild(input));
  input.click();
}

// ═══════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════
function setupUpload() {
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadImage(f);
  });
  input.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      state.image = img;
      state.shapes = [];
      resizeCanvas();
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('mainCanvas').style.display = 'block';
      document.getElementById('downloadBtn').disabled = false;
      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      document.getElementById('uploadIcon').textContent = '✓';
      document.getElementById('uploadText').textContent =
        file.name.length > 26 ? file.name.slice(0, 24) + '…' : file.name;
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════
//  CANVAS SIZING
//  The output canvas = photo + panel side-by-side (or top/bottom).
//  Photo is capped at 1200px on longest side.
// ═══════════════════════════════════════
function resizeCanvas() {
  if (!state.image) return;
  const canvas = document.getElementById('mainCanvas');
  const MAX = 1200;
  let pw = state.image.width, ph = state.image.height;
  if (pw > MAX) { ph = ph * MAX / pw; pw = MAX; }
  if (ph > MAX) { pw = pw * MAX / ph; ph = MAX; }
  pw = Math.round(pw); ph = Math.round(ph);

  const c = state.panelCrop;
  const side = state.panelSide;

  if (side === 'left' || side === 'right') {
    canvas.width  = pw + Math.round(pw * c);
    canvas.height = ph;
  } else {
    canvas.width  = pw;
    canvas.height = ph + Math.round(ph * c);
  }
}

// Returns { photoRect, panelRect, panelFullRect }
// panelRect   = visible (cropped) panel area in canvas pixels
// panelFullRect = full photo-sized panel rect (may extend off-canvas); used for shape coords
function getRects() {
  const canvas = document.getElementById('mainCanvas');
  const W = canvas.width, H = canvas.height;
  const side = state.panelSide;
  const c = state.panelCrop;

  let photoRect, panelRect, panelFullRect;
  if (side === 'left') {
    const photoW = Math.round(W / (1 + c));
    const panW   = W - photoW;
    panelRect    = { x: 0,      y: 0, w: panW,   h: H };
    photoRect    = { x: panW,   y: 0, w: photoW,  h: H };
    panelFullRect = { x: panW - photoW, y: 0, w: photoW, h: H };
  } else if (side === 'right') {
    const photoW = Math.round(W / (1 + c));
    const panW   = W - photoW;
    photoRect    = { x: 0,      y: 0, w: photoW,  h: H };
    panelRect    = { x: photoW, y: 0, w: panW,    h: H };
    panelFullRect = { x: photoW, y: 0, w: photoW, h: H };
  } else if (side === 'top') {
    const photoH = Math.round(H / (1 + c));
    const panH   = H - photoH;
    panelRect    = { x: 0, y: 0,      w: W, h: panH   };
    photoRect    = { x: 0, y: panH,   w: W, h: photoH };
    panelFullRect = { x: 0, y: panH - photoH, w: W, h: photoH };
  } else { // bottom
    const photoH = Math.round(H / (1 + c));
    const panH   = H - photoH;
    photoRect    = { x: 0, y: 0,      w: W, h: photoH };
    panelRect    = { x: 0, y: photoH, w: W, h: panH   };
    panelFullRect = { x: 0, y: photoH, w: W, h: photoH };
  }
  return { photoRect, panelRect, panelFullRect };
}

// ═══════════════════════════════════════
//  COLOR
// ═══════════════════════════════════════
function setupColorPicker() {
  const picker = document.getElementById('colorPicker');
  const hex    = document.getElementById('colorHex');
  picker.addEventListener('input', e => setColor(e.target.value));
  hex.addEventListener('input', e => {
    const v = e.target.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
  });
  hex.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = hex.value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
    }
  });
}

function setColor(c) {
  state.color = c.toUpperCase();
  updateColorUI(c.toUpperCase());
  updatePanelPreview();
  syncAddBtn();
  render();
}

function updateColorUI(c) {
  document.getElementById('colorPicker').value = c;
  document.getElementById('colorSwatch').style.background = c;
  document.getElementById('colorHex').value = c;
  document.querySelectorAll('.color-preset').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.color === c);
  });
}

// ═══════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════
function setPanelSide(side) {
  state.panelSide = side;
  ['left','right','top','bottom'].forEach(s => {
    document.getElementById('btnPan' + s.charAt(0).toUpperCase() + s.slice(1))
      .classList.toggle('active', s === side);
  });
  updatePanelPreview();
  resizeCanvas();
  render();
}

function onPanelCrop() {
  const v = parseInt(document.getElementById('panelCropSlider').value);
  state.panelCrop = v / 100;
  document.getElementById('panelCropVal').textContent = v + '%';
  updatePanelPreview();
  resizeCanvas();
  render();
}

function updatePanelPreview() {
  document.getElementById('ppColor').style.background = state.color;
  document.getElementById('ppPhoto').style.flex = 1;
  document.getElementById('ppColor').style.flex = state.panelCrop;
}

function setMode(m) {
  state.mode = m;
  document.getElementById('btnAuto').classList.toggle('active', m === 'auto');
  document.getElementById('btnCustom').classList.toggle('active', m === 'custom');
  document.getElementById('autoControls').style.display = m === 'auto' ? 'block' : 'none';
  document.getElementById('customControls').style.display = m === 'custom' ? 'block' : 'none';
  const canvas = document.getElementById('mainCanvas');
  canvas.classList.toggle('custom-mode', m === 'custom');
}


function buildFontBtns() {
  ['fontBtnsAuto', 'fontBtnsCustom'].forEach(id => {
    const wrap = document.getElementById(id);
    if (!wrap) return;
    wrap.innerHTML = '';
    FONT_OPTS.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'seg-btn' + (f.id === state.shapeFontId ? ' active' : '');
      btn.textContent = f.label;
      btn.onclick = () => setFont(f.id);
      wrap.appendChild(btn);
    });
  });
}

function setFont(id) {
  const f = FONT_OPTS.find(o => o.id === id);
  if (!f) return;
  state.shapeFontId  = id;
  state.shapeFont    = f.css;
  state.shapeFontWeight = f.w;
  // update all existing text shapes too
  state.shapes.forEach(s => {
    if (s.type === 'text') { s.font = f.css; s.fontWeight = f.w; }
  });
  document.querySelectorAll('#fontBtnsAuto .seg-btn, #fontBtnsCustom .seg-btn').forEach((btn, i) => {
    btn.classList.toggle('active', FONT_OPTS[i % FONT_OPTS.length].id === id);
  });
  document.fonts.load(`${f.w} 64px "${f.css.split(',')[0].replace(/"/g, '').trim()}"`)
    .then(() => render()).catch(() => render());
}

function selectShape(id) {
  state.selectedShape = id;
  document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.shapeId === id);
  });
  document.querySelectorAll('.letter-wrap').forEach(el => {
    el.style.display = id === 'text' ? 'block' : 'none';
  });
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

function updateLabel(rangeId, labelId, suffix) {
  document.getElementById(labelId).textContent = document.getElementById(rangeId).value + suffix;
}

// ═══════════════════════════════════════
//  AUTO GENERATE
//  Coordinates stored as fractions of the PHOTO rect [0..1].
// ═══════════════════════════════════════
function autoGenerate() {
  if (!state.image) return;
  const count    = parseInt(document.getElementById('shapeCount').value);
  const baseSize = parseFloat(document.getElementById('shapeSize').value);
  const variance = parseInt(document.getElementById('sizeVariance').value) / 100;
  const type     = state.selectedShape;

  state.shapes = [];
  const cols = Math.ceil(Math.sqrt(count * 1.5));
  const rows = Math.ceil(count / cols);

  const candidates = [];
  for (let r = 0; r < rows + 2; r++) {
    for (let c = 0; c < cols + 2; c++) {
      candidates.push({
        x: (c / (cols + 1)) + (Math.random() - 0.5) * (1 / (cols + 1)) * 1.2,
        y: (r / (rows + 1)) + (Math.random() - 0.5) * (1 / (rows + 1)) * 1.2,
      });
    }
  }
  shuffle(candidates);
  candidates.slice(0, count).forEach(pt => {
    const sizeMult = 1 - variance / 2 + Math.random() * variance;
    state.shapes.push({
      x: Math.max(0.02, Math.min(0.98, pt.x)),
      y: Math.max(0.02, Math.min(0.98, pt.y)),
      size: baseSize * sizeMult,
      type,
      rotation: Math.random() * Math.PI * 2,
      text: state.shapeLetter,
      font: state.shapeFont,
      fontWeight: state.shapeFontWeight,
    });
  });
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ═══════════════════════════════════════
//  CUSTOM PLACEMENT
// ═══════════════════════════════════════
function setupCanvasClick() {
  const canvas = document.getElementById('mainCanvas');
  canvas.addEventListener('click', e => {
    if (state.mode !== 'custom' || !state.image) return;
    const rect   = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const px = (e.clientX - rect.left) * scaleX;
    const py = (e.clientY - rect.top)  * scaleY;
    const size = parseFloat(document.getElementById('customSize').value);

    // Convert canvas pixel → photo-relative fraction
    const { photoRect: PR } = getRects();
    state.shapes.push({
      x: (px - PR.x) / PR.w,
      y: (py - PR.y) / PR.h,
      size,
      type: state.selectedShape,
      rotation: state.customRotation * Math.PI / 180,
      text: state.shapeLetter,
      font: state.shapeFont,
      fontWeight: state.shapeFontWeight,
    });
    updateShapeCountBadge();
    render();
  });
}

function undoShape() { state.shapes.pop(); updateShapeCountBadge(); render(); }
function clearShapes() { state.shapes = []; updateShapeCountBadge(); render(); }
function updateShapeCountBadge() {
  const el = document.getElementById('shapeCountBadge');
  const n  = state.shapes.length;
  el.textContent = n + (n === 1 ? ' shape' : ' shapes');
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
/*
  KEY INSIGHT:
  Shapes are stored as fractions of the PHOTO rect (0..1 in photo space).
  - On the photo:  draw shape at its photo-space position → solid color overlay
  - On the panel:  punch a hole at the SAME photo-space position,
                   and draw the photo behind at that same position
                   so the revealed content is identical to what's covered on the photo.

  This means: photo overlay shape ↔ panel hole ↔ panel photo reveal
  all three use identical photo-local coordinates. Perfect alignment guaranteed.
*/
function render() {
  if (!state.image) return;

  const canvas = document.getElementById('mainCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const { photoRect: PR, panelRect: PL, panelFullRect: PF } = getRects();

  ctx.clearRect(0, 0, W, H);

  // ── Step 1: Draw photo in its region ────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.rect(PR.x, PR.y, PR.w, PR.h);
  ctx.clip();
  ctx.drawImage(state.image, PR.x, PR.y, PR.w, PR.h);
  ctx.restore();

  if (state.shapes.length === 0) {
    ctx.fillStyle = state.color;
    ctx.fillRect(PL.x, PL.y, PL.w, PL.h);
    drawDivider(ctx, W, H, PR, PL);
    return;
  }

  // ── Step 2: Draw solid shapes over the photo ─────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.rect(PR.x, PR.y, PR.w, PR.h);
  ctx.clip();
  ctx.fillStyle = state.color;
  for (const shape of state.shapes) {
    const sx = PR.x + shape.x * PR.w;
    const sy = PR.y + shape.y * PR.h;
    if (shape.type === 'text') { drawTextShape(ctx, sx, sy, shape, PR.w, PR.h); }
    else { const fr = buildShapePath(ctx, sx, sy, shape, PR.w, PR.h); ctx.fill(fr); }
  }
  ctx.restore();

  // ── Step 3: Build panel (panel is always photo-sized; PL is the visible crop) ──

  // 3a. Draw the photo 1:1 into the full panel rect (no scaling)
  const offPanel = document.createElement('canvas');
  offPanel.width = W; offPanel.height = H;
  const opCtx = offPanel.getContext('2d');
  opCtx.drawImage(state.image, PF.x, PF.y, PF.w, PF.h);

  // 3b. Solid-color layer with holes punched at photo-space coords (no stretch)
  const offColor = document.createElement('canvas');
  offColor.width = W; offColor.height = H;
  const ocCtx = offColor.getContext('2d');

  ocCtx.fillStyle = state.color;
  ocCtx.fillRect(PL.x, PL.y, PL.w, PL.h);

  ocCtx.globalCompositeOperation = 'destination-out';
  for (const shape of state.shapes) {
    const sx = PF.x + shape.x * PF.w;
    const sy = PF.y + shape.y * PF.h;
    if (shape.type === 'text') { drawTextShape(ocCtx, sx, sy, shape, PF.w, PF.h); }
    else { const fr = buildShapePath(ocCtx, sx, sy, shape, PF.w, PF.h); ocCtx.fill(fr); }
  }
  ocCtx.globalCompositeOperation = 'source-over';

  // 3c. Composite onto main canvas, clipped to visible panel area
  ctx.save();
  ctx.beginPath();
  ctx.rect(PL.x, PL.y, PL.w, PL.h);
  ctx.clip();
  ctx.drawImage(offPanel, 0, 0);
  ctx.drawImage(offColor, 0, 0);
  ctx.restore();

  // ── Step 4: Divider ─────────────────────────────────────────────────
  drawDivider(ctx, W, H, PR, PL);
}

function drawDivider(ctx, W, H, PR, PL) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  const side = state.panelSide;
  if (side === 'left') {
    ctx.moveTo(PR.x, 0); ctx.lineTo(PR.x, H);
  } else if (side === 'right') {
    ctx.moveTo(PL.x, 0); ctx.lineTo(PL.x, H);
  } else if (side === 'top') {
    ctx.moveTo(0, PR.y); ctx.lineTo(W, PR.y);
  } else {
    ctx.moveTo(0, PL.y); ctx.lineTo(W, PL.y);
  }
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════
//  SHAPE PATH BUILDER
// ═══════════════════════════════════════
function drawTextShape(ctx, cx, cy, shape, W, H) {
  const fontSize = shape.size * Math.min(W, H) / 100 * 3.5;
  ctx.save();
  ctx.translate(cx, cy);
  if (shape.rotation) ctx.rotate(shape.rotation);
  const w = shape.fontWeight || state.shapeFontWeight || '900';
  ctx.font = `${w} ${fontSize}px ${shape.font || state.shapeFont}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(shape.text || 'A', 0, 0);
  ctx.restore();
}

function buildShapePath(ctx, cx, cy, shape, W, H) {
  const r   = shape.size * Math.min(W, H) / 100;
  const rot = shape.rotation || 0;

  ctx.save();
  ctx.translate(cx, cy);
  if (rot) ctx.rotate(rot);
  ctx.beginPath();

  let fillRule = 'nonzero';

  switch (shape.type) {
    case 'circle':
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      break;
    case 'star':
      starPath(ctx, 5, r, r * 0.42);
      break;
    case 'square':
      ctx.rect(-r, -r, r * 2, r * 2);
      break;
    case 'triangle':
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.866, r * 0.5);
      ctx.lineTo(-r * 0.866, r * 0.5);
      ctx.closePath();
      break;
    case 'heart':
      heartPath(ctx, r);
      break;
    case 'diamond':
      ctx.moveTo(0, -r); ctx.lineTo(r * 0.65, 0);
      ctx.lineTo(0, r);  ctx.lineTo(-r * 0.65, 0);
      ctx.closePath();
      break;
    case 'hexagon':
      polygonPath(ctx, 6, r, Math.PI / 6);
      break;
    case 'cross':
      crossPath(ctx, r);
      break;
    case 'moon':
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.arc(r * 0.38, 0, r * 0.72, 0, Math.PI * 2);
      fillRule = 'evenodd';
      break;
    case 'flower':
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3;
        ctx.arc(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5, r * 0.48, 0, Math.PI * 2);
      }
      ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
      break;
  }

  ctx.restore();
  return fillRule;
}

function starPath(ctx, points, outerR, innerR) {
  for (let i = 0; i < points * 2; i++) {
    const a = (i * Math.PI / points) - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else         ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
}

function polygonPath(ctx, sides, r, startAngle) {
  for (let i = 0; i < sides; i++) {
    const a = startAngle + (i * Math.PI * 2 / sides);
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else         ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
}

function crossPath(ctx, r) {
  const t = r * 0.32;
  ctx.moveTo(-t, -r);  ctx.lineTo(t, -r);
  ctx.lineTo(t, -t);   ctx.lineTo(r, -t);
  ctx.lineTo(r, t);    ctx.lineTo(t, t);
  ctx.lineTo(t, r);    ctx.lineTo(-t, r);
  ctx.lineTo(-t, t);   ctx.lineTo(-r, t);
  ctx.lineTo(-r, -t);  ctx.lineTo(-t, -t);
  ctx.closePath();
}

function heartPath(ctx, r) {
  const s = r * 0.9;
  ctx.moveTo(0, s * 0.4);
  ctx.bezierCurveTo(-s * 1.3, -s * 0.5, -s * 1.6, s * 0.6, 0, s * 1.3);
  ctx.bezierCurveTo(s * 1.6, s * 0.6, s * 1.3, -s * 0.5, 0, s * 0.4);
  ctx.closePath();
}

// ═══════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════
function downloadImage() {
  if (!state.image) return;
  const canvas = document.getElementById('mainCanvas');
  const dataUrl = canvas.toDataURL('image/png');
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  if (isIOS) {
    // iOS Safari doesn't support <a download> — open in new tab, user long-presses to save
    const w = window.open('', '_blank');
    w.document.write('<img src="' + dataUrl + '" style="max-width:100%;display:block">');
    w.document.title = 'Long press image to save';
  } else {
    const a = document.createElement('a');
    a.download = 'cutout-effect.png';
    a.href = dataUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}
